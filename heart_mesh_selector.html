<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>心脏 Mesh 识别工具</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#060c18; color:#e0eaff; font-family:'Courier New',monospace; display:flex; flex-direction:column; height:100vh; overflow:hidden; }

  #header { padding:12px 20px; border-bottom:1px solid rgba(0,200,255,.15); display:flex; align-items:center; gap:16px; flex-shrink:0; }
  #header h1 { font-size:.85rem; color:rgba(0,200,255,.8); letter-spacing:2px; text-transform:uppercase; }
  #status { font-size:.7rem; color:rgba(255,255,255,.4); margin-left:auto; }

  #main { display:flex; flex:1; overflow:hidden; }

  /* ── Canvas ── */
  #canvas-wrap { flex:1; position:relative; }
  canvas { width:100%; height:100%; display:block; }
  #canvas-hint { position:absolute; top:10px; left:50%; transform:translateX(-50%);
    font-size:.68rem; color:rgba(0,200,255,.6); background:rgba(6,12,24,.8);
    padding:4px 14px; border-radius:10px; pointer-events:none; white-space:nowrap; }

  /* ── Sidebar ── */
  #sidebar { width:280px; flex-shrink:0; border-left:1px solid rgba(0,200,255,.12);
    display:flex; flex-direction:column; overflow-y:auto; padding:16px; gap:10px; }

  .section-title { font-size:.65rem; color:rgba(0,200,255,.5); letter-spacing:2px;
    text-transform:uppercase; margin-bottom:4px; padding-bottom:6px;
    border-bottom:1px solid rgba(0,200,255,.1); }

  /* Mesh cards */
  .mesh-card { border-radius:10px; border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.03); overflow:hidden; transition:all .2s; cursor:pointer; }
  .mesh-card:hover { border-color:rgba(255,255,255,.2); background:rgba(255,255,255,.06); }
  .mesh-card.jumping { border-color:var(--col); background:rgba(255,255,255,.08);
    box-shadow:0 0 12px var(--col-a); }

  .mesh-card-header { display:flex; align-items:center; gap:10px; padding:10px 12px; }
  .mesh-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  .mesh-name { font-size:.75rem; font-weight:700; flex:1; }
  .mesh-toggle { width:36px; height:20px; border-radius:10px; border:1px solid rgba(255,255,255,.2);
    background:rgba(255,255,255,.05); position:relative; cursor:pointer; transition:all .2s; }
  .mesh-toggle.on { background:var(--col); border-color:var(--col); }
  .mesh-toggle::after { content:''; width:14px; height:14px; border-radius:50%;
    background:#fff; position:absolute; top:2px; left:2px; transition:transform .2s; }
  .mesh-toggle.on::after { transform:translateX(16px); }

  .mesh-stats { padding:0 12px 10px; display:flex; gap:16px; }
  .stat { font-size:.62rem; }
  .stat-label { color:rgba(255,255,255,.35); display:block; }
  .stat-val { color:rgba(255,255,255,.75); }

  /* Confirm button */
  #confirm-wrap { margin-top:6px; }
  #confirm-btn { width:100%; padding:10px; border-radius:8px;
    background:linear-gradient(135deg,rgba(0,200,255,.2),rgba(100,80,255,.15));
    border:1px solid rgba(0,200,255,.4); color:rgba(0,200,255,.9);
    font-size:.78rem; font-family:inherit; cursor:pointer; letter-spacing:1px;
    transition:all .2s; }
  #confirm-btn:hover { background:linear-gradient(135deg,rgba(0,200,255,.3),rgba(100,80,255,.25)); }

  #result-box { font-size:.68rem; line-height:1.8; padding:10px 12px;
    border-radius:8px; border:1px solid rgba(0,255,120,.2);
    background:rgba(0,255,120,.04); color:rgba(0,255,180,.85);
    display:none; white-space:pre-wrap; word-break:break-all; }

  /* Speed control */
  #speed-wrap { display:flex; align-items:center; gap:8px; }
  #speed-wrap label { font-size:.68rem; color:rgba(255,255,255,.4); white-space:nowrap; }
  #speed-range { flex:1; accent-color:rgba(0,200,255,.8); }
  #speed-val { font-size:.68rem; color:rgba(0,200,255,.7); width:40px; text-align:right; }

  #loading { position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:12px; background:#060c18; z-index:10; }
  #loading-bar-wrap { width:200px; height:3px; background:rgba(255,255,255,.1); border-radius:2px; }
  #loading-bar { height:100%; width:0%; background:rgba(0,200,255,.8); border-radius:2px; transition:width .3s; }
  #loading-txt { font-size:.72rem; color:rgba(0,200,255,.6); }
</style>
</head>
<body>

<div id="header">
  <h1>心脏 Mesh 识别工具</h1>
  <span id="status">加载模型中…</span>
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="cv"></canvas>
    <div id="canvas-hint">拖动旋转 · 滚轮缩放</div>
    <div id="loading">
      <div id="loading-txt">正在加载模型…</div>
      <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
    </div>
  </div>

  <div id="sidebar">
    <div class="section-title">Mesh 列表</div>
    <div id="mesh-list"></div>

    <div class="section-title" style="margin-top:6px">跳动速度</div>
    <div id="speed-wrap">
      <label>BPM</label>
      <input type="range" id="speed-range" min="20" max="180" value="72">
      <span id="speed-val">72</span>
    </div>

    <div id="confirm-wrap">
      <button id="confirm-btn" onclick="exportResult()">✓ 导出选中结果</button>
    </div>
    <div id="result-box"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const MESH_META = [
  { idx:0, name:'tripo_part_0', verts:'765,090', yRange:'-0.186 ~ 0.490', color:'#ff3333', colorA:'rgba(255,50,50,.3)' },
  { idx:1, name:'tripo_part_1', verts:'45,121',  yRange:'0.446 ~ 0.490',  color:'#3366ff', colorA:'rgba(50,100,255,.3)' },
  { idx:2, name:'tripo_part_2', verts:'16,481',  yRange:'-0.089 ~ -0.002',color:'#22cc44', colorA:'rgba(30,200,60,.3)' },
  { idx:3, name:'tripo_part_3', verts:'14,923',  yRange:'-0.170 ~ -0.114',color:'#ffaa00', colorA:'rgba(255,170,0,.3)' },
  { idx:4, name:'tripo_part_6', verts:'276,901', yRange:'-0.491 ~ -0.133',color:'#cc44ff', colorA:'rgba(200,60,255,.3)' },
];

// State: which meshes are jumping
const jumping = new Set();
let meshObjects = {}; // name -> THREE.Mesh
let jumpGroups = {};  // name -> THREE.Group (wraps the mesh)
let staticGroup, scene, camera, renderer, raf;
let phase = 0, bpm = 72;

// Build sidebar cards
const list = document.getElementById('mesh-list');
MESH_META.forEach(m => {
  const card = document.createElement('div');
  card.className = 'mesh-card';
  card.id = 'card-'+m.idx;
  card.style.setProperty('--col', m.color);
  card.style.setProperty('--col-a', m.colorA);
  card.innerHTML = `
    <div class="mesh-card-header">
      <div class="mesh-dot" style="background:${m.color}"></div>
      <div class="mesh-name">${m.name}</div>
      <div class="mesh-toggle" id="tog-${m.idx}" onclick="toggleMesh(${m.idx})"></div>
    </div>
    <div class="mesh-stats">
      <div class="stat"><span class="stat-label">顶点</span><span class="stat-val">${m.verts}</span></div>
      <div class="stat"><span class="stat-label">Y范围</span><span class="stat-val">${m.yRange}</span></div>
    </div>`;
  list.appendChild(card);
});

document.getElementById('speed-range').addEventListener('input', function(){
  bpm = +this.value;
  document.getElementById('speed-val').textContent = bpm;
});

function toggleMesh(idx) {
  const meta = MESH_META[idx];
  const tog = document.getElementById('tog-'+idx);
  const card = document.getElementById('card-'+idx);
  tog.classList.toggle('on');
  card.classList.toggle('jumping');
  if (jumping.has(meta.name)) {
    jumping.delete(meta.name);
    // Move mesh back to static group
    const mesh = meshObjects[meta.name];
    if (mesh && jumpGroups[meta.name]) {
      jumpGroups[meta.name].remove(mesh);
      staticGroup.attach(mesh);
      scene.remove(jumpGroups[meta.name]);
    }
  } else {
    jumping.add(meta.name);
    // Move mesh into its own jump group
    const mesh = meshObjects[meta.name];
    if (mesh) {
      if (!jumpGroups[meta.name]) {
        jumpGroups[meta.name] = new THREE.Group();
        scene.add(jumpGroups[meta.name]);
      }
      staticGroup.remove(mesh);
      // Preserve world transform via attach
      jumpGroups[meta.name].attach(mesh);
    }
  }
}

// Init Three.js
const cv = document.getElementById('cv');
scene = new THREE.Scene();
scene.background = new THREE.Color(0x060c18);
scene.add(new THREE.AmbientLight(0xffffff, 0.9));
const dl = new THREE.DirectionalLight(0xfff4f0, 1.8); dl.position.set(3,6,4); scene.add(dl);
const dl2 = new THREE.DirectionalLight(0x8899ff, 0.4); dl2.position.set(-4,2,-3); scene.add(dl2);
const ptl = new THREE.PointLight(0xff3333, 1.0, 5); ptl.position.set(0,.5,1.5); scene.add(ptl);

camera = new THREE.PerspectiveCamera(42, 1, .01, 50);
camera.position.set(0, 0.2, 3.5); camera.lookAt(0, 0, 0);

renderer = new THREE.WebGLRenderer({ canvas:cv, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

// Resize
function resize(){
  const w = cv.parentElement.clientWidth, h = cv.parentElement.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w/h; camera.updateProjectionMatrix();
}
resize(); window.addEventListener('resize', resize);

// Orbit
let drag=false, px=0, py=0, ct=0, cp=0.12, cr=3.5;
function updCam(){ camera.position.set(cr*Math.sin(ct)*Math.cos(cp), cr*Math.sin(cp), cr*Math.cos(ct)*Math.cos(cp)); camera.lookAt(0,0,0); }
cv.addEventListener('mousedown', e=>{ drag=true; px=e.clientX; py=e.clientY; });
cv.addEventListener('mousemove', e=>{ if(!drag)return; ct-=(e.clientX-px)*.006; cp=Math.max(-.5,Math.min(1.1,cp+(e.clientY-py)*.005)); px=e.clientX; py=e.clientY; updCam(); });
cv.addEventListener('mouseup', ()=>drag=false);
cv.addEventListener('mouseleave', ()=>drag=false);
cv.addEventListener('wheel', e=>{ e.preventDefault(); cr=Math.max(1,Math.min(8,cr+e.deltaY*.004)); updCam(); }, {passive:false});

// Static group holds non-jumping meshes
staticGroup = new THREE.Group();
scene.add(staticGroup);

// Load model
const loader = new THREE.GLTFLoader();
loader.load(
  'https://frog.oss-cn-shanghai.aliyuncs.com/anatomical%20heart%203d%20model.glb',
  gltf => {
    const model = gltf.scene;
    // Normalize scale
    const box = new THREE.Box3().setFromObject(model);
    const s = box.getSize(new THREE.Vector3());
    const sc = 1.4 / Math.max(s.x, s.y, s.z);
    model.scale.setScalar(sc);
    const b2 = new THREE.Box3().setFromObject(model);
    const ctr = b2.getCenter(new THREE.Vector3());
    model.position.sub(ctr);
    model.traverse(c=>{ if(c.isMesh){ c.castShadow=true; c.receiveShadow=true; } });

    // Collect meshes by node name & apply debug colors
    model.traverse(c=>{
      if(!c.isMesh) return;
      const meta = MESH_META.find(m=>m.name===c.name);
      if(meta){
        meshObjects[c.name] = c;
        // Color by mesh
        c.material = new THREE.MeshStandardMaterial({
          color: new THREE.Color(meta.color),
          roughness: .45, metalness: .05
        });
      }
    });

    staticGroup.add(model);

    document.getElementById('loading').style.display='none';
    document.getElementById('status').textContent = `已加载 ${Object.keys(meshObjects).length} 个 mesh`;

    // Render loop
    let lastT = performance.now();
    (function loop(){
      raf = requestAnimationFrame(loop);
      const now = performance.now(), dt=(now-lastT)/1000; lastT=now;
      phase = (phase + dt*(bpm/60)) % 1;

      // Pulse: smooth heartbeat curve
      let pulse = 1.0;
      if(phase<.10) pulse = 1 + .14*(phase/.10);
      else if(phase<.22) pulse = 1 + .14*(1-(phase-.10)/.12);
      else if(phase<.32) pulse = 1 - .07*Math.sin((phase-.22)/.10*Math.PI);

      ptl.intensity = 0.6 + pulse*.6;

      // Apply pulse to jumping mesh groups
      jumping.forEach(name=>{
        const g = jumpGroups[name];
        if(g) g.scale.setScalar(pulse);
      });

      renderer.render(scene, camera);
    })();
  },
  xhr => {
    const pct = xhr.total ? Math.round(xhr.loaded/xhr.total*100) : 0;
    document.getElementById('loading-bar').style.width = pct+'%';
    document.getElementById('loading-txt').textContent = `加载中 ${pct}%…`;
  },
  e => {
    document.getElementById('loading-txt').textContent = '❌ 加载失败（检查OSS权限）';
    console.error(e);
  }
);

function exportResult(){
  const heartList = [...jumping];
  const tubeList = MESH_META.map(m=>m.name).filter(n=>!jumping.has(n));
  const code = `// 心脏跳动 meshes:\nconst HEART_MESHES = ${JSON.stringify(heartList)};\n// 静止 meshes (管子等):\nconst TUBE_MESHES  = ${JSON.stringify(tubeList)};`;
  const box = document.getElementById('result-box');
  box.style.display = 'block';
  box.textContent = code;
  document.getElementById('confirm-btn').textContent = '✓ 已复制到下方';
}
</script>
</body>
</html>
