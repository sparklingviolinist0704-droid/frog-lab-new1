<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>骨骼肌 Mesh 识别工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080e1a;color:#e0eaff;font-family:'Courier New',monospace;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#header{padding:12px 20px;border-bottom:1px solid rgba(0,200,255,.15);display:flex;align-items:center;gap:16px;flex-shrink:0}
#header h1{font-size:.85rem;color:rgba(0,200,255,.8);letter-spacing:2px;text-transform:uppercase}
#status{font-size:.7rem;color:rgba(255,255,255,.4);margin-left:auto}
#main{display:flex;flex:1;overflow:hidden}
#canvas-wrap{flex:1;position:relative}
canvas{width:100%;height:100%;display:block}
#canvas-hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:.68rem;color:rgba(0,200,255,.6);background:rgba(6,12,24,.8);padding:4px 14px;border-radius:10px;pointer-events:none;white-space:nowrap}
#sidebar{width:290px;flex-shrink:0;border-left:1px solid rgba(0,200,255,.12);display:flex;flex-direction:column;overflow-y:auto;padding:16px;gap:10px}
.section-title{font-size:.65rem;color:rgba(0,200,255,.5);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;padding-bottom:6px;border-bottom:1px solid rgba(0,200,255,.1)}
.mesh-card{border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);overflow:hidden;transition:all .2s}
.mesh-card.contracting{border-color:var(--col);box-shadow:0 0 14px var(--col-a)}
.mesh-card-header{display:flex;align-items:center;gap:10px;padding:10px 12px}
.mesh-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.mesh-name{font-size:.75rem;font-weight:700;flex:1}
.mesh-toggle{width:36px;height:20px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);position:relative;cursor:pointer;transition:all .2s;flex-shrink:0}
.mesh-toggle.on{background:var(--col);border-color:var(--col)}
.mesh-toggle::after{content:'';width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .2s}
.mesh-toggle.on::after{transform:translateX(16px)}
.mesh-stats{padding:0 12px 10px;display:flex;gap:12px;flex-wrap:wrap}
.stat{font-size:.62rem}
.stat-label{color:rgba(255,255,255,.35);display:block}
.stat-val{color:rgba(255,255,255,.75)}
.mode-btns{display:flex;gap:6px;margin-bottom:4px}
.mode-btn{flex:1;padding:6px;border-radius:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-size:.65rem;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center}
.mode-btn.active{background:rgba(0,200,255,.15);border-color:rgba(0,200,255,.4);color:rgba(0,200,255,.9)}
#speed-wrap{display:flex;align-items:center;gap:8px}
#speed-wrap label{font-size:.68rem;color:rgba(255,255,255,.4);white-space:nowrap}
#speed-range{flex:1;accent-color:rgba(0,200,255,.8)}
#speed-val{font-size:.68rem;color:rgba(0,200,255,.7);width:40px;text-align:right}
#confirm-btn{width:100%;padding:10px;border-radius:8px;background:linear-gradient(135deg,rgba(0,200,255,.2),rgba(100,80,255,.15));border:1px solid rgba(0,200,255,.4);color:rgba(0,200,255,.9);font-size:.78rem;font-family:inherit;cursor:pointer;letter-spacing:1px;transition:all .2s;margin-top:6px}
#confirm-btn:hover{background:linear-gradient(135deg,rgba(0,200,255,.3),rgba(100,80,255,.25))}
#result-box{font-size:.65rem;line-height:1.8;padding:10px 12px;border-radius:8px;border:1px solid rgba(0,255,120,.2);background:rgba(0,255,120,.04);color:rgba(0,255,180,.85);display:none;white-space:pre-wrap;word-break:break-all;margin-top:6px}
#loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#080e1a;z-index:10}
#loading-bar-wrap{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:2px}
#loading-bar{height:100%;width:0%;background:rgba(0,200,255,.8);border-radius:2px;transition:width .3s}
#loading-txt{font-size:.72rem;color:rgba(0,200,255,.6)}
</style>
</head>
<body>
<div id="header">
  <h1>骨骼肌 Mesh 识别工具</h1>
  <span id="status">加载中…</span>
</div>
<div id="main">
  <div id="canvas-wrap">
    <canvas id="cv"></canvas>
    <div id="canvas-hint">拖动旋转 · 滚轮缩放</div>
    <div id="loading">
      <div id="loading-txt">正在加载模型…</div>
      <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
    </div>
  </div>
  <div id="sidebar">
    <div class="section-title">动画模式</div>
    <div class="mode-btns">
      <div class="mode-btn active" id="mode-contract" onclick="setMode('contract')">💪 收缩</div>
      <div class="mode-btn" id="mode-glow" onclick="setMode('glow')">⚡ 发光</div>
      <div class="mode-btn" id="mode-both" onclick="setMode('both')">✦ 两者</div>
    </div>
    <div class="section-title">Mesh 列表（点开关选择）</div>
    <div id="mesh-list"></div>
    <div class="section-title" style="margin-top:4px">速度</div>
    <div id="speed-wrap">
      <label>速度</label>
      <input type="range" id="speed-range" min="0.2" max="3" step="0.1" value="1">
      <span id="speed-val">1.0x</span>
    </div>
    <button id="confirm-btn" onclick="exportResult()">✓ 导出结果</button>
    <div id="result-box"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const MESH_META = [
  {idx:0,name:'tripo_part_6',verts:'362,841',yRange:'-0.212~-0.078',xRange:'0.072~0.215', color:'#ff3333',colorA:'rgba(255,50,50,.3)'},
  {idx:1,name:'tripo_part_5',verts:'3,015',  yRange:'-0.140~-0.113',xRange:'0.139~0.170', color:'#3366ff',colorA:'rgba(50,100,255,.3)'},
  {idx:2,name:'tripo_part_1',verts:'37,832', yRange:'-0.115~0.108', xRange:'-0.162~0.042',color:'#22cc44',colorA:'rgba(30,200,60,.3)'},
  {idx:3,name:'tripo_part_0',verts:'601,254',yRange:'-0.233~0.232', xRange:'-0.232~0.232',color:'#ffaa00',colorA:'rgba(255,170,0,.3)'},
];

const active = new Set(); // meshes with animation
let meshObjects = {};
let animMode = 'contract'; // contract | glow | both
let speed = 1.0;
let scene, camera, renderer, ptl;
let t = 0;

// Build cards
MESH_META.forEach(m=>{
  const card = document.createElement('div');
  card.className = 'mesh-card';
  card.id = 'card-'+m.idx;
  card.style.setProperty('--col', m.color);
  card.style.setProperty('--col-a', m.colorA);
  card.innerHTML = `
    <div class="mesh-card-header">
      <div class="mesh-dot" style="background:${m.color}"></div>
      <div class="mesh-name">${m.name}</div>
      <div class="mesh-toggle" id="tog-${m.idx}" onclick="toggleMesh(${m.idx})"></div>
    </div>
    <div class="mesh-stats">
      <div class="stat"><span class="stat-label">顶点</span><span class="stat-val">${m.verts}</span></div>
      <div class="stat"><span class="stat-label">Y范围</span><span class="stat-val">${m.yRange}</span></div>
      <div class="stat"><span class="stat-label">X范围</span><span class="stat-val">${m.xRange}</span></div>
    </div>`;
  document.getElementById('mesh-list').appendChild(card);
});

document.getElementById('speed-range').addEventListener('input',function(){
  speed=+this.value;
  document.getElementById('speed-val').textContent=speed.toFixed(1)+'x';
});

function setMode(m){
  animMode=m;
  ['contract','glow','both'].forEach(k=>{
    document.getElementById('mode-'+k).classList.toggle('active',k===m);
  });
}

function toggleMesh(idx){
  const meta = MESH_META[idx];
  const tog = document.getElementById('tog-'+idx);
  const card = document.getElementById('card-'+idx);
  tog.classList.toggle('on');
  card.classList.toggle('contracting');
  if(active.has(meta.name)) active.delete(meta.name);
  else active.add(meta.name);
}

// Three.js
const cv = document.getElementById('cv');
scene = new THREE.Scene();
scene.background = new THREE.Color(0x080e1a);
scene.add(new THREE.AmbientLight(0xffffff,.8));
const dl = new THREE.DirectionalLight(0xfff0e8,1.7); dl.position.set(2,5,3); scene.add(dl);
const dl2 = new THREE.DirectionalLight(0x8899ff,.35); dl2.position.set(-3,1,-2); scene.add(dl2);
ptl = new THREE.PointLight(0xffee44,0,4); ptl.position.set(0,0,1.5); scene.add(ptl);

camera = new THREE.PerspectiveCamera(42,1,.01,50);
camera.position.set(0,.1,3.5); camera.lookAt(0,0,0);
renderer = new THREE.WebGLRenderer({canvas:cv,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

function resize(){
  const w=cv.parentElement.clientWidth,h=cv.parentElement.clientHeight;
  renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix();
}
resize(); window.addEventListener('resize',resize);

let drag=false,px=0,py=0,ct=0,cp=0.1,cr=3.5;
function updCam(){camera.position.set(cr*Math.sin(ct)*Math.cos(cp),cr*Math.sin(cp),cr*Math.cos(ct)*Math.cos(cp));camera.lookAt(0,0,0);}
cv.addEventListener('mousedown',e=>{drag=true;px=e.clientX;py=e.clientY;});
cv.addEventListener('mousemove',e=>{if(!drag)return;ct-=(e.clientX-px)*.006;cp=Math.max(-.5,Math.min(1.1,cp+(e.clientY-py)*.005));px=e.clientX;py=e.clientY;updCam();});
cv.addEventListener('mouseup',()=>drag=false);
cv.addEventListener('mouseleave',()=>drag=false);
cv.addEventListener('wheel',e=>{e.preventDefault();cr=Math.max(1,Math.min(8,cr+e.deltaY*.004));updCam();},{passive:false});

// Load
const loader = new THREE.GLTFLoader();
loader.load(
  'https://frog.oss-cn-shanghai.aliyuncs.com/anatomical%20muscle%203d%20model.glb',
  gltf=>{
    const model = gltf.scene;
    const box = new THREE.Box3().setFromObject(model);
    const s = box.getSize(new THREE.Vector3());
    const sc = 1.6/Math.max(s.x,s.y,s.z);
    model.scale.setScalar(sc);
    const b2 = new THREE.Box3().setFromObject(model);
    model.position.sub(b2.getCenter(new THREE.Vector3()));
    model.traverse(c=>{
      if(!c.isMesh) return;
      c.castShadow=true; c.receiveShadow=true;
      const meta = MESH_META.find(m=>m.name===c.name);
      if(meta){
        meshObjects[c.name]=c;
        // debug color
        c.material = new THREE.MeshStandardMaterial({
          color:new THREE.Color(meta.color),
          roughness:.45, metalness:.05,
          emissive:new THREE.Color(0,0,0), emissiveIntensity:0,
        });
        c.userData.origScale = c.scale.clone();
      }
    });
    scene.add(model);
    document.getElementById('loading').style.display='none';
    document.getElementById('status').textContent=`已加载 ${Object.keys(meshObjects).length} 个 mesh`;

    let lastT=performance.now();
    (function loop(){
      requestAnimationFrame(loop);
      const now=performance.now(),dt=(now-lastT)/1000; lastT=now;
      t += dt*speed;

      let anyGlow=false;
      MESH_META.forEach(meta=>{
        const mesh = meshObjects[meta.name];
        if(!mesh) return;
        const mat = mesh.material;
        const bs = mesh.userData.origScale;
        if(active.has(meta.name)){
          // 收缩动画
          if(animMode==='contract'||animMode==='both'){
            const c = Math.max(0,Math.sin(t*2.5)*.5+.5);
            mesh.scale.set(bs.x*(1+c*.1), bs.y*(1-c*.18), bs.z*(1+c*.1));
          } else {
            mesh.scale.copy(bs);
          }
          // 发光动画
          if(animMode==='glow'||animMode==='both'){
            const g = Math.max(0,Math.sin(t*4));
            mat.emissive.set(new THREE.Color(meta.color));
            mat.emissiveIntensity = g*.6;
            anyGlow=true;
          } else {
            mat.emissiveIntensity=0;
          }
        } else {
          mesh.scale.copy(bs);
          mat.emissiveIntensity=0;
        }
      });
      ptl.intensity = anyGlow ? 0.8+Math.sin(t*4)*.4 : 0;
      renderer.render(scene,camera);
    })();
  },
  xhr=>{
    const pct=xhr.total?Math.round(xhr.loaded/xhr.total*100):0;
    document.getElementById('loading-bar').style.width=pct+'%';
    document.getElementById('loading-txt').textContent=`加载中 ${pct}%…`;
  },
  e=>{
    document.getElementById('loading-txt').textContent='❌ 加载失败（检查OSS权限）';
    console.error(e);
  }
);

function exportResult(){
  const muscle = [...active];
  const nerve = MESH_META.map(m=>m.name).filter(n=>!active.has(n));
  const code = [
    `// 选中做动画的 mesh（肌肉/收缩）:`,
    `const MUSCLE_MESHES = ${JSON.stringify(muscle)};`,
    ``,
    `// 未选中的 mesh（神经管/传导）:`,
    `const NERVE_MESHES  = ${JSON.stringify(nerve)};`,
  ].join('\n');
  const box = document.getElementById('result-box');
  box.style.display='block'; box.textContent=code;
  document.getElementById('confirm-btn').textContent='✓ 复制结果后告诉我！';
}
</script>
</body>
</html>
